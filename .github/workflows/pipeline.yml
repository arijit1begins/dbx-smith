name: Unified Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Base Ref
        id: base-ref
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "base=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
            else
              echo "base=$(git rev-list --max-parents=0 HEAD)" >> $GITHUB_OUTPUT
            fi
          else
            echo "base=" >> $GITHUB_OUTPUT
          fi

      - name: Check for Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base-ref.outputs.base }}
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'RELEASING.md'
              - 'package.json'
              - '.github/workflows/**'
            code:
              - 'bin/**'
              - 'src/**'
              - 'tests/**'
              - 'test.sh'
              - 'Makefile'
              - 'install.sh'

  ci:
    name: Continuous Integration
    needs: detect
    # Run CI if:
    # 1. It is a pull request.
    # 2. It is a tag push.
    # 3. It is a main push that contains code changes.
    if: |
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'push' && 
        github.ref_name == 'main' && 
        needs.detect.outputs.code == 'true' && 
        !contains(github.event.head_commit.message, '[skip branch ci]')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Run ShellCheck (only if code changes were detected)
      - name: Run ShellCheck
        if: needs.detect.outputs.code == 'true'
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'
          additional_files: 'src/dbx-smith.sh'
      
      # 2. Install Podman & Distrobox (only if code changes were detected)
      - name: Install Podman & Distrobox
        if: needs.detect.outputs.code == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          curl -s https://raw.githubusercontent.com/89luca89/distrobox/main/install | sudo sh
      
      # 3. Run Full Strategy Test Matrix (only if code changes were detected)
      - name: Run Full Strategy Test Matrix
        if: needs.detect.outputs.code == 'true'
        run: ./test.sh --full --halt-on-failure
        env:
          PREFIX: ${{ github.workspace }}/.local

      # 4. Verify Docusaurus Build (only if documentation changes were detected)
      - name: Setup Node.js (Docs Validation)
        if: needs.detect.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Docs Dependencies
        if: needs.detect.outputs.docs == 'true'
        run: npm ci
        working-directory: docs

      - name: Build Website (Validation)
        if: needs.detect.outputs.docs == 'true'
        run: npm run build
        working-directory: docs

  release:
    name: GitHub Release
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - name: Create Production Bundle
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          BUNDLE_NAME="dbx-smith-v${VERSION}.tar.gz"
          # Create a clean bundle excluding dev-only files (docs, tests, git configs)
          tar -czf "$BUNDLE_NAME" \
            bin/ \
            src/ \
            man/ \
            Makefile \
            install.sh \
            LICENSE \
            README.md
          echo "BUNDLE_NAME=$BUNDLE_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            ${{ env.BUNDLE_NAME }}
            install.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Deploy Documentation
    needs: [detect, ci]
    # We must run this job if:
    # 1. It is a workflow dispatch (manual trigger).
    # 2. It is a tag push (we require CI to pass first).
    # 3. It is a push to main and docs changes are detected (we skip CI if code changes are false).
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (startsWith(github.ref, 'refs/tags/v') && needs.ci.result == 'success') ||
        (
          github.event_name == 'push' && 
          github.ref == 'refs/heads/main' && 
          needs.detect.outputs.docs == 'true' && 
          !contains(github.event.head_commit.message, '[skip branch ci]') &&
          (needs.ci.result == 'success' || needs.ci.result == 'skipped')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: docs

      - name: Build Website
        run: npm run build
        working-directory: docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
