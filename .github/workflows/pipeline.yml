name: Unified Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Continuous Integration
    # Skip branch-push CI if we are also triggering via tag push to avoid duplicates
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, '[skip branch ci]'))
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Documentation Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'RELEASING.md'
              - 'package.json'
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'
          additional_files: 'src/dbx-smith.sh'
      
      - name: Install Podman & Distrobox
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          curl -s https://raw.githubusercontent.com/89luca89/distrobox/main/install | sudo sh
      
      - name: Run Full Strategy Test Matrix
        run: ./test.sh
        env:
          PREFIX: ${{ github.workspace }}/.local

  release:
    name: GitHub Release
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - name: Install Semantic Release
        run: npm install -g semantic-release @semantic-release/github @semantic-release/commit-analyzer @semantic-release/release-notes-generator
      
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We run semantic-release on the tag. 
          # We specify --branches main to ensure it uses the main branch context 
          # for calculating notes even if the checkout is detached.
          npx semantic-release --branches main

  docs:
    name: Deploy Documentation
    needs: ci
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.outputs.docs == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: docs

      - name: Build Website
        run: npm run build
        working-directory: docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
